# Veritas demo KB — US labor market, January through June 2025.
#
# NOTE: values are *illustrative for demo purposes*. They are plausible but
# should not be treated as the authoritative BLS figures. The point of this
# KB is to give the verifier deterministic ground truth so we can demo
# ✓ / ✗ / contradiction behaviour. Swap in real BLS releases before any
# externally-verifiable demo.
#
# Subjects are canonical: "<metric> <Month YYYY>". Flash is prompted to
# normalise to this shape so paraphrases map to the same key.
#
# Schema mirrors core.schemas.VerifiedFact (minus id / embedding / first_seen_ts).

